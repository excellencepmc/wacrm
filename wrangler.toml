name = "casasindhu-wa-crm"
main = ".open-next/worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat_v2"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ─── Non-secret vars (safe to commit) ────────────────────────────────────────
[vars]
NEXTAUTH_URL         = "https://casasindhu-wa-crm.excellencetechlab.workers.dev"
NEXT_PUBLIC_SITE_URL = "https://casasindhu-wa-crm.excellencetechlab.workers.dev"
AUTH_TRUST_HOST      = "true"

# ─── Secrets (set via Cloudflare Dashboard or `wrangler secret put`) ─────────
# Never commit real values here.
#
#   DATABASE_URL          — postgresql://daleepkumar:<pass>@13.126.60.216:5432/casasindhu-wa?sslmode=disable
#   NEXTAUTH_SECRET       — existing value from .env.local
#   ENCRYPTION_KEY        — existing value from .env.local
#   META_APP_SECRET       — Meta Developers → App Settings → Basic → App Secret
#   AUTOMATION_CRON_SECRET — run: openssl rand -hex 32

# ─── Local dev override (wrangler dev / cf:preview) ──────────────────────────
